<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebRTC DXGI+NVENC Stream with Xbox UI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <style>
        :root {
            --xbox-green: #107C10;
            --xbox-red: #E81123;
            --xbox-blue: #0078D7;
            --xbox-yellow: #F2C811;
            --bg-glass: rgba(255, 255, 255, 0.15);
            --active-glass: rgba(255, 255, 255, 0.4);
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background: #121212;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        #video-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            object-fit: contain; 
            z-index: 1; 
        }

        .container {
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            width: 100vw;
            height: 100vh;
            z-index: 10;
        }

        #left-zone, #right-zone {
            flex: 1;
            height: 100%;
            position: relative;
        }

        #left-stick-zone {
            position: absolute;
            left: calc(25% - 80px);
            bottom: calc(28% - 80px);
            width: 160px;
            height: 160px;
        }

        .btn {
            background: var(--bg-glass);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            transition: transform 0.05s, background 0.1s;
            position: absolute;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 10;
        }

        .abxy-container {
            position: absolute;
            bottom: 18%;
            right: 10%;
            width: 170px;
            height: 170px;
            pointer-events: none;
        }

        .btn-action { width: 55px; height: 55px; pointer-events: auto; }
        .btn-y { top: 0; left: 50%; transform: translateX(-50%); border-color: var(--xbox-yellow); color: var(--xbox-yellow); text-shadow: 0 0 5px rgba(0,0,0,0.8); }
        .btn-a { bottom: 0; left: 50%; transform: translateX(-50%); border-color: var(--xbox-green); color: var(--xbox-green); text-shadow: 0 0 5px rgba(0,0,0,0.8); }
        .btn-x { left: 0; top: 50%; transform: translateY(-50%); border-color: var(--xbox-blue); color: var(--xbox-blue); text-shadow: 0 0 5px rgba(0,0,0,0.8); }
        .btn-b { right: 0; top: 50%; transform: translateY(-50%); border-color: var(--xbox-red); color: var(--xbox-red); text-shadow: 0 0 5px rgba(0,0,0,0.8); }

        #debug {
            position: fixed;
            top: 10px;
            left: 10px;
            pointer-events: none;
            background: rgba(0,0,0,0.75);
            padding: 12px;
            border-radius: 5px;
            font-size: 0.7rem;
            font-family: monospace;
            z-index: 100;
            max-width: 300px;
            color: #00ff00; /* Hacker green for visibility */
            line-height: 1.35;
        }
        #debug.hidden { display: none; }

        #debug-toggle {
            position: fixed;
            top: 10px;
            left: 10px;
            width: 34px; height: 34px;
            z-index: 101;
            background: var(--bg-glass);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            color: #fff; font-size: 1rem;
            display: flex; align-items: center; justify-content: center;
        }

        /* Pressed feedback for every touch control */
        .btn.pressed { background: var(--active-glass); transform: scale(0.92); }

        /* Shoulders (LB/RB) and triggers (LT/RT) along the top edge */
        .btn-top {
            width: 74px; height: 40px;
            border-radius: 12px;
            font-size: 0.95rem;
            pointer-events: auto;
        }
        .btn-lt { top: 10px; left: 4%; border-color: rgba(255,255,255,0.4); }
        .btn-lb { top: 56px; left: 4%; }
        .btn-rt { top: 10px; right: 4%; border-color: rgba(255,255,255,0.4); }
        .btn-rb { top: 56px; right: 4%; }

        /* Center system buttons: View / Guide / Menu */
        .btn-sys {
            top: 12px;
            width: 46px; height: 34px;
            font-size: 0.9rem;
            border-radius: 8px;
            pointer-events: auto;
        }
        .btn-view  { left: calc(50% - 78px); }
        .btn-guide { left: calc(50% - 23px); border-color: var(--xbox-green); color: var(--xbox-green); border-radius: 50%; width: 40px; height: 40px; }
        .btn-menu  { left: calc(50% + 32px); }

        /* Stick-click buttons (L3 / R3) */
        .btn-stickclick { width: 46px; height: 46px; font-size: 0.8rem; }
        .btn-l3 { left: 3%;  bottom: 28%; }
        .btn-r3 { right: 3%; bottom: 28%; }

        /* D-pad — compact cross on the left (character swap) */
        .dpad {
            position: absolute;
            left: 2%;
            bottom: 44%;
            width: 126px;
            height: 126px;
            pointer-events: none;
        }
        .btn-dpad { width: 42px; height: 42px; border-radius: 9px; pointer-events: auto; font-size: 1rem; }
        .d-up    { top: 0;    left: 42px; }
        .d-down  { bottom: 0; left: 42px; }
        .d-left  { left: 0;   top: 42px; }
        .d-right { right: 0;  top: 42px; }

        /* Center toggle: hide/show the whole controller overlay */
        .container.hidden { display: none; }
        #overlay-toggle {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 46px; height: 46px;
            z-index: 101;
            background: var(--bg-glass);
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 50%;
            color: #fff; font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center;
            opacity: 0.55;
        }
    </style>
</head>
<body>

    <div id="debug" class="hidden">Initializing Resource Monitor...</div>
    <div id="debug-toggle">≡</div>
    <div id="overlay-toggle">🎮</div>

    <div class="container" id="container">
        <!-- Shoulders + triggers -->
        <div class="btn btn-top btn-lt" data-trigger="LT">LT</div>
        <div class="btn btn-top btn-lb" data-btn="LB">LB</div>
        <div class="btn btn-top btn-rt" data-trigger="RT">RT</div>
        <div class="btn btn-top btn-rb" data-btn="RB">RB</div>

        <!-- System buttons -->
        <div class="btn btn-sys btn-view"  data-btn="Back">&#9112;</div>
        <div class="btn btn-sys btn-guide" data-btn="Guide">&#10062;</div>
        <div class="btn btn-sys btn-menu"  data-btn="Start">&#9776;</div>

        <div id="left-zone">
            <!-- D-pad (character swap) -->
            <div class="dpad">
                <div class="btn btn-dpad d-up"    data-btn="Up">&#9650;</div>
                <div class="btn btn-dpad d-down"  data-btn="Down">&#9660;</div>
                <div class="btn btn-dpad d-left"  data-btn="Left">&#9664;</div>
                <div class="btn btn-dpad d-right" data-btn="Right">&#9654;</div>
            </div>
            <div id="left-stick-zone"></div>
            <div class="btn btn-stickclick btn-l3" data-btn="L3">L3</div>
        </div>

        <div id="right-zone">
            <!-- Right stick removed: the right side is now a touch-camera area (native
                 touch-look). The container touch handlers below capture it on the base
                 layer, so these buttons still sit on top. -->
            <div class="btn btn-stickclick btn-r3" data-btn="R3">R3</div>
            <div class="abxy-container">
                <div class="btn btn-action btn-y" data-btn="Y">Y</div>
                <div class="btn btn-action btn-b" data-btn="B">B</div>
                <div class="btn btn-action btn-a" data-btn="A">A</div>
                <div class="btn btn-action btn-x" data-btn="X">X</div>
            </div>
        </div>
    </div>

    <canvas id="video-canvas" width="1920" height="1080"></canvas>
    <script>

        let isSending = false;

        // ENABLED THE LOOP HERE
        function sendLoop() {
            //sendPacket(); 
            //requestAnimationFrame(sendLoop); 
        }

        // --- 1. UI & State Setup ---
        const debugElement = document.getElementById('debug');
        const canvas = document.getElementById('video-canvas');
        const ctx = canvas.getContext('2d', { alpha: false }); 
        
        let packetCount = 0;
        let dataChannel;
        let decoderStatus = "Initializing";

        const state = { lx: 0, ly: 0, dx: 0, dy: 0, buttons: 0, lt: 0, rt: 0 };

        // Button bit layout — MUST match protocol/packet.hpp
        const BTN = {
            A: 0, B: 1, X: 2, Y: 3, LB: 4, RB: 5, Start: 6, Back: 7,
            Up: 8, Down: 9, Left: 10, Right: 11, L3: 12, R3: 13, Guide: 14,
        };

        // --- NEW: Resource Monitor State ---
        let currentFps = 0;
        let framesThisSecond = 0;
        let lastFpsTime = performance.now();
        
        // --- Telemetry / observation log state ---
        // Per-second aggregates built from the server's per-frame records:
        const tele = { frames: 0, idrs: 0, bytes: 0,
                       encUsSum: 0, encUsMax: 0, pipeUsSum: 0, pipeUsMax: 0, dtUsMax: 0 };
        // Per-second RATES derived from getStats() deltas (NOT cumulative counters):
        const netRate = { lossPct: 0, recvMbps: 0, decFps: 0,
                          pli: 0, nack: 0, fir: 0, jitterMs: 0, freezes: 0 };
        let prevStats = null;       // previous getStats snapshot for delta math
        let lastServerFrame = null; // most recent per-frame record from server
        let lastRow = null;         // most recent 1s rollup (for the overlay)
        const logRows = [];         // downloadable client-side log

        // --- Adaptive bitrate (client decides from network, server applies) ---
        // Reconfiguring NVENC costs a frame, so we change RARELY and GENTLY:
        //  - hysteresis: only act on *sustained* conditions (streaks), not one noisy tick
        //  - rate-limit: at most one change every few seconds
        //  - gentle steps: small deltas so each reconfigure is cheap and invisible
        const abr = {
            bps: 5000000, min: 1500000, max: 8000000,
            tick: 0, lossStreak: 0, cleanStreak: 0, lastChangeTick: -99,
        };
        const ABR_COOLDOWN = 3;   // ticks (~seconds) between changes
        const ABR_DROP_AFTER = 2; // sustained loss ticks before backing off
        const ABR_RISE_AFTER = 4; // sustained clean ticks before probing up

        function adaptBitrate() {
            abr.tick++;
            if (abr.tick < 3) return;               // skip ~first 2s (warmup / IDR burst)
            if (!dataChannel || dataChannel.readyState !== 'open') return;

            const loss = netRate.lossPct;
            const usingBps = netRate.recvMbps * 1e6; // what we're actually pushing

            // Track how long the condition has held (hysteresis).
            abr.lossStreak  = (loss > 2.0) ? abr.lossStreak + 1 : 0;
            abr.cleanStreak = (loss < 0.5) ? abr.cleanStreak + 1 : 0;

            // Rate-limit: don't reconfigure more often than the cooldown.
            if (abr.tick - abr.lastChangeTick < ABR_COOLDOWN) return;

            let next = abr.bps;
            if (abr.lossStreak >= ABR_DROP_AFTER) {
                next = abr.bps - 1000000;                                  // gentle -1 Mbps
            } else if (abr.cleanStreak >= ABR_RISE_AFTER && usingBps > abr.bps * 0.6) {
                next = abr.bps + 500000;                                   // gentle +0.5 Mbps
            }
            next = Math.max(abr.min, Math.min(abr.max, Math.round(next)));

            if (Math.abs(next - abr.bps) >= 250000) {   // deadband
                abr.bps = next;
                abr.lastChangeTick = abr.tick;
                abr.lossStreak = 0; abr.cleanStreak = 0; // reset after acting
                try { dataChannel.send(JSON.stringify({ type: 'bitrate', bps: abr.bps })); } catch (_) {}
            }
        }

        function setupTelemetry(ch) {
            ch.onopen = () => console.log('[RTC] telemetry channel open');
            ch.onmessage = (e) => {
                let r; try { r = JSON.parse(e.data); } catch { return; }
                if (r.t !== 'f') return;
                tele.frames++;
                tele.bytes += r.bytes;
                if (r.idr) tele.idrs++;
                tele.encUsSum  += r.encUs;  tele.encUsMax  = Math.max(tele.encUsMax,  r.encUs);
                tele.pipeUsSum += r.pipeUs; tele.pipeUsMax = Math.max(tele.pipeUsMax, r.pipeUs);
                tele.dtUsMax = Math.max(tele.dtUsMax, r.dtUs);
                lastServerFrame = r;
            };
        }

        // Measure true FPS
        function measureFPS() {
            framesThisSecond++;
            const now = performance.now();
            if (now - lastFpsTime >= 1000) {
                currentFps = framesThisSecond;
                framesThisSecond = 0;
                lastFpsTime = now;
            }
            requestAnimationFrame(measureFPS);
        }
        requestAnimationFrame(measureFPS);

        // Fetch WebRTC data and derive PER-SECOND rates (deltas), not raw counters.
        async function fetchRTCStats() {
            if (!pc) return;
            try {
                const stats = await pc.getStats();
                let inbound = null;
                stats.forEach(rep => {
                    if (rep.type === 'inbound-rtp' && rep.kind === 'video') inbound = rep;
                });
                if (!inbound) return;

                const now = performance.now();
                const cur = {
                    t: now,
                    packetsReceived: inbound.packetsReceived || 0,
                    packetsLost: inbound.packetsLost || 0,
                    bytesReceived: inbound.bytesReceived || 0,
                    framesDecoded: inbound.framesDecoded || 0,
                    pliCount: inbound.pliCount || 0,
                    nackCount: inbound.nackCount || 0,
                    firCount: inbound.firCount || 0,
                    freezeCount: inbound.freezeCount || 0,
                };

                if (prevStats) {
                    const dt = (now - prevStats.t) / 1000; // seconds
                    const dRecv  = cur.packetsReceived - prevStats.packetsReceived;
                    const dLost  = cur.packetsLost     - prevStats.packetsLost;
                    const dBytes = cur.bytesReceived   - prevStats.bytesReceived;
                    const dFrm   = cur.framesDecoded   - prevStats.framesDecoded;
                    const denom  = dRecv + dLost;
                    // THE number that actually matters: fraction of packets lost this second.
                    netRate.lossPct  = denom > 0 ? (100 * dLost / denom) : 0;
                    netRate.recvMbps = dt > 0 ? (8 * dBytes / dt) / 1e6 : 0;
                    netRate.decFps   = dt > 0 ? dFrm / dt : 0;
                    netRate.pli      = cur.pliCount  - prevStats.pliCount;
                    netRate.nack     = cur.nackCount - prevStats.nackCount;
                    netRate.fir      = cur.firCount  - prevStats.firCount;
                    netRate.freezes  = cur.freezeCount - prevStats.freezeCount;
                }
                netRate.jitterMs = (inbound.jitter || 0) * 1000;
                prevStats = cur;
            } catch (err) {
                console.warn("Could not fetch RTC stats");
            }
        }

        // Snapshot one second of telemetry into a log row, then reset accumulators.
        function rollupSecond() {
            const f = tele.frames || 1;
            const row = {
                sec:       (performance.now() / 1000).toFixed(1),
                srvFps:    tele.frames,
                idrPerS:   tele.idrs,
                srvMbps:   (8 * tele.bytes / 1e6).toFixed(2),
                encMsAvg:  (tele.encUsSum / f / 1000).toFixed(2),
                encMsMax:  (tele.encUsMax / 1000).toFixed(2),
                pipeMsAvg: (tele.pipeUsSum / f / 1000).toFixed(2),
                pipeMsMax: (tele.pipeUsMax / 1000).toFixed(2),
                dtMsMax:   (tele.dtUsMax / 1000).toFixed(2),
                lossPct:   netRate.lossPct.toFixed(1),
                recvMbps:  netRate.recvMbps.toFixed(2),
                decFps:    Math.round(netRate.decFps),
                pli:       netRate.pli,
                nack:      netRate.nack,
                fir:       netRate.fir,
                jitterMs:  netRate.jitterMs.toFixed(1),
                freezes:   netRate.freezes,
            };
            logRows.push(row);
            if (logRows.length > 3600) logRows.shift(); // cap ~1 hour
            lastRow = row;
            tele.frames = 0; tele.idrs = 0; tele.bytes = 0;
            tele.encUsSum = 0; tele.encUsMax = 0;
            tele.pipeUsSum = 0; tele.pipeUsMax = 0; tele.dtUsMax = 0;
        }

        // Download the client-side observation log as CSV (also bound to the "L" key).
        window.saveLog = () => {
            if (!logRows.length) { console.warn('[telemetry] no rows yet'); return; }
            const cols = Object.keys(logRows[0]);
            const csv = [cols.join(',')]
                .concat(logRows.map(r => cols.map(c => r[c]).join(',')))
                .join('\n');
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
            a.download = 'client_telemetry.csv';
            a.click();
        };
        window.addEventListener('keydown', (e) => {
            if (e.key === 'l' || e.key === 'L') window.saveLog();
        });

        function updateDebug() {
            // Calculate Memory
            let memStr = "N/A";
            if (performance.memory) {
                memStr = Math.round(performance.memory.usedJSHeapSize / 1024 / 1024) + " MB";
            }

            const r = lastRow || {};
            const loss = parseFloat(r.lossPct || 0);
            const lossFlag = loss > 2 ? ' <<' : ''; // flag when loss is meaningful
            debugElement.innerHTML = `
        === SYSTEM ===<br>
        FPS: ${currentFps} | RAM: ${memStr}<br>
        Dec: ${decoderStatus}<br>
        === NETWORK (per sec) ===<br>
        WS:  ${socket.readyState === 1 ? 'Connected' : 'Disconnected'} | RTC: ${pc?.connectionState || 'N/A'}<br>
        Loss: ${r.lossPct ?? '-'}%${lossFlag} | Jit: ${r.jitterMs ?? '-'}ms | Frz: ${r.freezes ?? '-'}<br>
        Recv: ${r.recvMbps ?? '-'} / Sent: ${r.srvMbps ?? '-'} Mbps<br>
        ABR: ${(abr.bps / 1e6).toFixed(1)} Mbps target<br>
        PLI/s: ${r.pli ?? '-'} | NACK/s: ${r.nack ?? '-'} | Dec: ${r.decFps ?? '-'}fps<br>
        === PIPELINE (server) ===<br>
        Enc: ${r.encMsAvg ?? '-'}/${r.encMsMax ?? '-'}ms | Pipe: ${r.pipeMsAvg ?? '-'}/${r.pipeMsMax ?? '-'}ms<br>
        SrvFps: ${r.srvFps ?? '-'} | IDR/s: ${r.idrPerS ?? '-'} | dtMax: ${r.dtMsMax ?? '-'}ms<br>
        === INPUTS ===<br>
        Out: ${packetCount} pkts | Tchs: ${touchSlots.filter(x => x !== null).length}/5<br>
        LS:  ${state.lx}, ${state.ly}<br>
        RS:  ${state.dx}, ${state.dy}<br>
        Btn: 0x${state.buttons.toString(16).padStart(2, '0')}
            `.trim();
        }

        // --- 2. WebCodecs Hardware Decoder Setup ---
        let pendingFrame = null;
        const decoder = new VideoDecoder({
            output(frame) {
                if (pendingFrame) {
                    pendingFrame.close();
                }
                pendingFrame = frame;

                requestAnimationFrame(() => {
                    if (pendingFrame) {
                        ctx.drawImage(pendingFrame, 0, 0, canvas.width, canvas.height);
                        pendingFrame.close(); 
                        pendingFrame = null;
                    }
                });
            },
            error(e) {
                console.error("WebCodecs Decoder Error:", e);
                decoderStatus = "Error - Check Console";
            }
        });

        decoder.configure({
            codec: 'avc1.42E02A', // 1080p Baseline Profile
            hardwareAcceleration: 'prefer-hardware',
            optimizeForLatency: true
        });

        // --- 3. WebRTC & Signaling Setup ---
        const socket = new WebSocket('ws://192.168.1.194:8081'); 

        const pc = new RTCPeerConnection({
            iceServers: [{ urls: 'stun:stun.l.google.com:19302' }],
            encodedInsertableStreams: true 
        });

        pc.ondatachannel = (event) => {
            const ch = event.channel;

            // Route the observation-log channel separately from input.
            if (ch.label === 'telemetry') {
                setupTelemetry(ch);
                return;
            }

            dataChannel = ch;
            dataChannel.onopen = () => {
                console.log('[RTC] DataChannel opened');
                if (!isSending) {
                    isSending = true;
                    sendLoop(); // START LOOP HERE
                }
            };
            dataChannel.onerror = (err) => console.error('[RTC] DataChannel error:', err);
            dataChannel.onclose = () => {
                console.log('[RTC] DataChannel closed');
                isSending = false;
            };
        };

        pc.ontrack = (event) => {
            if (event.track.kind === 'video') {
                decoderStatus = "Hardware Decoding Active";
                
                const receiver = event.receiver;
                const { readable } = receiver.createEncodedStreams();
                const reader = readable.getReader();

                let totalFramesReceived = 0;
                let localDroppedFrames = 0;

                async function processNetworkStream() {
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        totalFramesReceived++;
                        decoderStatus = `Decoding (${totalFramesReceived}) | Q-Drop: ${localDroppedFrames}`;

                        if (decoder.decodeQueueSize > 5) {
                            localDroppedFrames++;
                            continue; 
                        }

                        const chunk = new EncodedVideoChunk({
                            type: value.type,
                            timestamp: value.timestamp,
                            data: value.data
                        });
                        
                        try {
                            decoder.decode(chunk);
                        } catch (err) {
                            decoderStatus = "Decode Error: " + err.message;
                        }
                    }
                }
                processNetworkStream();
            }
        };

        socket.onopen = () => {
            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.send(JSON.stringify({
                        candidate: event.candidate.candidate,
                        mid: event.candidate.sdpMid
                    }));
                }
            };
        };

        socket.onmessage = async (event) => {
            const msg = JSON.parse(event.data);
            if (msg.type === 'offer') {
                await pc.setRemoteDescription(new RTCSessionDescription(msg));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                socket.send(JSON.stringify({ type: 'answer', sdp: pc.localDescription.sdp }));
            } 
            else if (msg.candidate) {
                await pc.addIceCandidate(new RTCIceCandidate({
                    candidate: msg.candidate,
                    sdpMid: msg.mid
                }));
            }
        };

        // --- 4. Virtual Controller Logic (49-byte structs) ---
        const touchSlots = new Array(5).fill(null);
        const touchStates = Array.from({length: 5}, () => ({
            x: 0, y: 0, id: 0, state: 0, pressure: 0,
        }));

        const alloc = (id) => {
            for (let i = 0; i < 5; i++) {
                if (touchSlots[i] === null) { touchSlots[i] = id; return i; }
            }
            return -1;
        };
        const getSlot = (id) => touchSlots.indexOf(id);
        const freeSlot = (id) => {
            const i = touchSlots.indexOf(id);
            if (i !== -1) touchSlots[i] = null;
            return i;
        };

        function sendInput(type, key, value) {
            if (type === "axis" && key === "LeftStick") {
                state.lx = Math.floor(value.x * 32767);
                state.ly = Math.floor(value.y * 32767);
            }
            if (type === "axis" && key === "RightStick") {
                state.dx = Math.floor(value.x * 32767);
                state.dy = Math.floor(value.y * 32767);
            }
            if (type === "trigger") {
                // key = "LT" | "RT"; digital press -> full pull
                if (key === "LT") state.lt = value ? 255 : 0;
                if (key === "RT") state.rt = value ? 255 : 0;
            }
            if (type === "button") {
                const bit = BTN[key];
                if (bit === undefined) return;
                if (value) state.buttons |= (1 << bit);
                else state.buttons &= ~(1 << bit);
            }
            sendPacket();
        }

        function sendPacket() {
            if (!dataChannel || dataChannel.readyState !== 'open') return;

            const buffer = new ArrayBuffer(52);
            const view = new DataView(buffer);

            view.setInt16(0, state.lx, true);
            view.setInt16(2, state.ly, true);
            view.setInt16(4, state.dx, true);
            view.setInt16(6, state.dy, true);

            for (let i = 0; i < 5; i++) {
                const tp = touchStates[i];
                const o = 8 + i * 8;
                view.setInt16(o,     Math.floor(tp.x * 32767), true);
                view.setInt16(o + 2, Math.floor(tp.y * 32767), true);
                view.setInt8 (o + 4, tp.id);
                view.setInt8 (o + 5, tp.state);
                view.setInt16(o + 6, Math.round((tp.pressure || 1.0) * 32767), true);
            }

            view.setUint16(48, state.buttons, true); // 16-bit button mask
            view.setUint8(50, state.lt);             // left trigger
            view.setUint8(51, state.rt);             // right trigger

            try {
                dataChannel.send(buffer);
                packetCount++;
            } catch (err) {
                console.error('[Send] Error:', err);
            }
        }

        // --- 5. UI Event Listeners ---
        // Pointer events unify touch/mouse and don't leak into the screen-touch layer.
        function bindHoldButton(el) {
            const btnName = el.getAttribute('data-btn');
            const trigName = el.getAttribute('data-trigger');
            const press = (v) => {
                if (trigName) sendInput('trigger', trigName, v);
                else if (btnName) sendInput('button', btnName, v);
            };
            let active = false;
            const down = (e) => {
                e.preventDefault(); e.stopPropagation();
                if (active) return;
                active = true;
                try { el.setPointerCapture(e.pointerId); } catch (_) {}
                if (navigator.vibrate) navigator.vibrate(15);
                el.classList.add('pressed');
                press(1);
            };
            const up = (e) => {
                if (!active) return;
                active = false;
                el.classList.remove('pressed');
                press(0);
            };
            el.addEventListener('pointerdown', down);
            el.addEventListener('pointerup', up);
            el.addEventListener('pointercancel', up);
            // Keep button taps out of the screen-touch layer (no phantom touch points).
            el.addEventListener('touchstart', e => e.stopPropagation(), { passive: true });
            el.addEventListener('touchend', e => e.stopPropagation(), { passive: true });
        }
        document.querySelectorAll('.btn[data-btn], .btn[data-trigger]').forEach(bindHoldButton);

        // Debug overlay toggle
        const dbgEl = document.getElementById('debug');
        document.getElementById('debug-toggle').addEventListener('pointerdown', (e) => {
            e.preventDefault(); e.stopPropagation();
            dbgEl.classList.toggle('hidden');
        });

        // Controller overlay toggle (center button) — hide/show all gamepad controls.
        const containerEl = document.getElementById('container');
        document.getElementById('overlay-toggle').addEventListener('pointerdown', (e) => {
            e.preventDefault(); e.stopPropagation();
            containerEl.classList.toggle('hidden');
        });

        // Helper to build an analog stick that reports to a given axis.
        function makeStick(zoneId, axisName) {
            const stick = nipplejs.create({
                zone: document.getElementById(zoneId),
                mode: 'static',
                position: { left: '50%', bottom: '50%' },
                color: 'rgba(255,255,255,0.5)',
                size: 130
            });
            stick.on('move', (evt, data) => {
                const x = Math.cos(data.angle.radian) * (data.distance / 65);
                const y = Math.sin(data.angle.radian) * (data.distance / 65);
                sendInput('axis', axisName, { x, y });
            });
            stick.on('end', () => sendInput('axis', axisName, { x: 0, y: 0 }));
            // Keep stick touches out of the screen-touch layer.
            const el = document.getElementById(zoneId);
            el.addEventListener('touchstart', e => e.stopPropagation(), { passive: true });
            el.addEventListener('touchmove', e => e.stopPropagation(), { passive: true });
            el.addEventListener('touchend', e => e.stopPropagation(), { passive: true });
            return stick;
        }

        const leftStick = makeStick('left-stick-zone', 'LeftStick');
        // Right stick removed — right side is a touch-camera pad (see container handlers).

        const container = document.getElementById("container");
        container.addEventListener('touchstart', (e) => {
            for (const t of e.changedTouches) {
                const slot = alloc(t.identifier);
                if (slot === -1) continue;
                touchStates[slot] = { x: t.clientX / window.innerWidth, y: t.clientY / window.innerHeight, id: slot, state: 1, pressure: t.force || 1.0 };
            }
            sendPacket();
        }, { passive: true });
        
        // Camera smoothing: lower = smoother (less jitter) but more lag. 1.0 = off.
        const SMOOTHING = 0.4;
        container.addEventListener('touchmove', (e) => {
            for (const t of e.changedTouches) {
                const slot = getSlot(t.identifier);
                if (slot === -1) continue;

                const prev = touchStates[slot];
                const rawX = t.clientX / window.innerWidth;
                const rawY = t.clientY / window.innerHeight;

                let newX = rawX;
                let newY = rawY;

                if (prev && prev.state === 1) { 
                    newX = prev.x + (rawX - prev.x) * SMOOTHING;
                    newY = prev.y + (rawY - prev.y) * SMOOTHING;
                }

                touchStates[slot] = { 
                    ...prev, 
                    x: newX, 
                    y: newY, 
                    state: 1, 
                    pressure: t.force || prev.pressure 
                };
            }
            sendPacket();
        }, { passive: true });
        
        container.addEventListener('touchend', (e) => {
            for (const t of e.changedTouches) {
                const slot = freeSlot(t.identifier);
                if (slot === -1) continue;
                touchStates[slot] = { ...touchStates[slot], id: slot, state: 2 };
            }
            sendPacket();
            setTimeout(() => {
                for (let i = 0; i < 5; i++) {
                    if (touchStates[i].state === 2) {
                        touchStates[i] = { x: 0, y: 0, id: 0, state: 0, pressure: 0 };
                    }
                }
            }, 50);
        }, { passive: true });

        window.oncontextmenu = (e) => e.preventDefault();
        
        // Update dashboard every second
        setInterval(async () => {
            await fetchRTCStats();
            rollupSecond();
            adaptBitrate();
            updateDebug();
        }, 1000);
        updateDebug();
    </script>
