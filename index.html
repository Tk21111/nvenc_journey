<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebRTC DXGI+NVENC Stream with Xbox UI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <style>
        :root {
            --xbox-green: #107C10;
            --xbox-red: #E81123;
            --xbox-blue: #0078D7;
            --xbox-yellow: #F2C811;
            --bg-glass: rgba(255, 255, 255, 0.15);
            --active-glass: rgba(255, 255, 255, 0.4);
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background: #121212;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        #video-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            object-fit: contain; 
            z-index: 1; 
        }

        .container {
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            width: 100vw;
            height: 100vh;
            z-index: 10;
        }

        #left-zone, #right-zone {
            flex: 1;
            height: 100%;
            position: relative;
        }

        #left-stick-zone {
            position: absolute;
            left: calc(25% - 80px);
            bottom: calc(20% - 80px);
            width: 160px;
            height: 160px;
        }

        #right-stick-zone {
            position: absolute;
            left: calc(25% - 70px);
            bottom: calc(20% - 70px);
            width: 140px;
            height: 140px;
        }

        .btn {
            background: var(--bg-glass);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            transition: transform 0.05s, background 0.1s;
            position: absolute;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 10;
        }

        .abxy-container {
            position: absolute;
            bottom: 10%;
            right: 10%;
            width: 170px;
            height: 170px;
            pointer-events: none;
        }

        .btn-action { width: 55px; height: 55px; pointer-events: auto; }
        .btn-y { top: 0; left: 50%; transform: translateX(-50%); border-color: var(--xbox-yellow); color: var(--xbox-yellow); text-shadow: 0 0 5px rgba(0,0,0,0.8); }
        .btn-a { bottom: 0; left: 50%; transform: translateX(-50%); border-color: var(--xbox-green); color: var(--xbox-green); text-shadow: 0 0 5px rgba(0,0,0,0.8); }
        .btn-x { left: 0; top: 50%; transform: translateY(-50%); border-color: var(--xbox-blue); color: var(--xbox-blue); text-shadow: 0 0 5px rgba(0,0,0,0.8); }
        .btn-b { right: 0; top: 50%; transform: translateY(-50%); border-color: var(--xbox-red); color: var(--xbox-red); text-shadow: 0 0 5px rgba(0,0,0,0.8); }

        #debug {
            position: fixed;
            top: 10px;
            left: 10px;
            pointer-events: none;
            background: rgba(0,0,0,0.75);
            padding: 12px;
            border-radius: 5px;
            font-size: 0.75rem;
            font-family: monospace;
            z-index: 100;
            max-width: 350px;
            color: #00ff00; /* Hacker green for visibility */
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div id="debug">Initializing Resource Monitor...</div>
    
    <div class="container" id="container">
        <div id="left-zone">
            <div id="left-stick-zone"></div>
        </div>
        
        <div id="right-zone">
            <div class="abxy-container">
                <div class="btn btn-action btn-y" data-btn="Y">Y</div>
                <div class="btn btn-action btn-b" data-btn="B">B</div>
                <div class="btn btn-action btn-a" data-btn="A">A</div>
                <div class="btn btn-action btn-x" data-btn="X">X</div>
            </div>
        </div>
    </div>
    
    <canvas id="video-canvas" width="1920" height="1080"></canvas>
    <script>

        let isSending = false;

        // ENABLED THE LOOP HERE
        function sendLoop() {
            //sendPacket(); 
            //requestAnimationFrame(sendLoop); 
        }

        // --- 1. UI & State Setup ---
        const debugElement = document.getElementById('debug');
        const canvas = document.getElementById('video-canvas');
        const ctx = canvas.getContext('2d', { alpha: false }); 
        
        let packetCount = 0;
        let dataChannel;
        let decoderStatus = "Initializing";

        const state = { lx: 0, ly: 0, dx: 0, dy: 0, buttons: 0 };

        // --- NEW: Resource Monitor State ---
        let currentFps = 0;
        let framesThisSecond = 0;
        let lastFpsTime = performance.now();
        
        const rtcStats = { bitrate: "0.00", packetLoss: 0, framesDropped: 0 };
        let lastBytesReceived = 0;
        let lastStatTime = performance.now();

        // Measure true FPS
        function measureFPS() {
            framesThisSecond++;
            const now = performance.now();
            if (now - lastFpsTime >= 1000) {
                currentFps = framesThisSecond;
                framesThisSecond = 0;
                lastFpsTime = now;
            }
            requestAnimationFrame(measureFPS);
        }
        requestAnimationFrame(measureFPS);

        // Fetch WebRTC Data
        async function fetchRTCStats() {
            if (!pc) return;
            try {
                const stats = await pc.getStats();
                stats.forEach(report => {
                    if (report.type === 'inbound-rtp' && report.kind === 'video') {
                        const now = performance.now();
                        const bytes = report.bytesReceived;
                        
                        // Calculate Bitrate (Mbps)
                        if (lastBytesReceived > 0) {
                            const bitRateBps = (8 * (bytes - lastBytesReceived)) / ((now - lastStatTime) / 1000);
                            rtcStats.bitrate = (bitRateBps / 1000000).toFixed(2);
                        }
                        
                        lastBytesReceived = bytes;
                        lastStatTime = now;
                        
                        rtcStats.packetLoss = report.packetsLost || 0;
                        rtcStats.framesDropped = report.framesDropped || 0;
                    }
                });
            } catch (err) {
                console.warn("Could not fetch RTC stats");
            }
        }

        function updateDebug() {
            // Calculate Memory
            let memStr = "N/A";
            if (performance.memory) {
                memStr = Math.round(performance.memory.usedJSHeapSize / 1024 / 1024) + " MB";
            }

            debugElement.innerHTML = `
        === SYSTEM ===<br>
        FPS: ${currentFps} | RAM: ${memStr}<br>
        Dec: ${decoderStatus}<br>
        === NETWORK ===<br>
        WS:  ${socket.readyState === 1 ? 'Connected' : 'Disconnected'} | RTC: ${pc?.connectionState || 'N/A'}<br>
        Spd: ${rtcStats.bitrate} Mbps<br>
        Err: ${rtcStats.packetLoss} Pkt Loss | ${rtcStats.framesDropped} Frame Drop<br>
        === INPUTS ===<br>
        Out: ${packetCount} pkts | Tchs: ${touchSlots.filter(x => x !== null).length}/5<br>
        LS:  ${state.lx}, ${state.ly}<br>
        RS:  ${state.dx}, ${state.dy}<br>
        Btn: 0x${state.buttons.toString(16).padStart(2, '0')}
            `.trim();
        }

        // --- 2. WebCodecs Hardware Decoder Setup ---
        let pendingFrame = null;
        const decoder = new VideoDecoder({
            output(frame) {
                if (pendingFrame) {
                    pendingFrame.close();
                }
                pendingFrame = frame;

                requestAnimationFrame(() => {
                    if (pendingFrame) {
                        ctx.drawImage(pendingFrame, 0, 0, canvas.width, canvas.height);
                        pendingFrame.close(); 
                        pendingFrame = null;
                    }
                });
            },
            error(e) {
                console.error("WebCodecs Decoder Error:", e);
                decoderStatus = "Error - Check Console";
            }
        });

        decoder.configure({
            codec: 'avc1.42E02A', // 1080p Baseline Profile
            hardwareAcceleration: 'prefer-hardware',
            optimizeForLatency: true
        });

        // --- 3. WebRTC & Signaling Setup ---
        const socket = new WebSocket('ws://192.168.1.135:8081'); 

        const pc = new RTCPeerConnection({
            iceServers: [{ urls: 'stun:stun.l.google.com:19302' }],
            encodedInsertableStreams: true 
        });

        pc.ondatachannel = (event) => {
            dataChannel = event.channel;
            dataChannel.onopen = () => {
                console.log('[RTC] DataChannel opened');
                if (!isSending) {
                    isSending = true;
                    sendLoop(); // START LOOP HERE
                }
            };
            dataChannel.onerror = (err) => console.error('[RTC] DataChannel error:', err);
            dataChannel.onclose = () => {
                console.log('[RTC] DataChannel closed');
                isSending = false;
            };
        };

        pc.ontrack = (event) => {
            if (event.track.kind === 'video') {
                decoderStatus = "Hardware Decoding Active";
                
                const receiver = event.receiver;
                const { readable } = receiver.createEncodedStreams();
                const reader = readable.getReader();

                let totalFramesReceived = 0;
                let localDroppedFrames = 0;

                async function processNetworkStream() {
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        totalFramesReceived++;
                        decoderStatus = `Decoding (${totalFramesReceived}) | Q-Drop: ${localDroppedFrames}`;

                        if (decoder.decodeQueueSize > 5) {
                            localDroppedFrames++;
                            continue; 
                        }

                        const chunk = new EncodedVideoChunk({
                            type: value.type,
                            timestamp: value.timestamp,
                            data: value.data
                        });
                        
                        try {
                            decoder.decode(chunk);
                        } catch (err) {
                            decoderStatus = "Decode Error: " + err.message;
                        }
                    }
                }
                processNetworkStream();
            }
        };

        socket.onopen = () => {
            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.send(JSON.stringify({
                        candidate: event.candidate.candidate,
                        mid: event.candidate.sdpMid
                    }));
                }
            };
        };

        socket.onmessage = async (event) => {
            const msg = JSON.parse(event.data);
            if (msg.type === 'offer') {
                await pc.setRemoteDescription(new RTCSessionDescription(msg));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                socket.send(JSON.stringify({ type: 'answer', sdp: pc.localDescription.sdp }));
            } 
            else if (msg.candidate) {
                await pc.addIceCandidate(new RTCIceCandidate({
                    candidate: msg.candidate,
                    sdpMid: msg.mid
                }));
            }
        };

        // --- 4. Virtual Controller Logic (49-byte structs) ---
        const touchSlots = new Array(5).fill(null);
        const touchStates = Array.from({length: 5}, () => ({
            x: 0, y: 0, id: 0, state: 0, pressure: 0,
        }));

        const alloc = (id) => {
            for (let i = 0; i < 5; i++) {
                if (touchSlots[i] === null) { touchSlots[i] = id; return i; }
            }
            return -1;
        };
        const getSlot = (id) => touchSlots.indexOf(id);
        const freeSlot = (id) => {
            const i = touchSlots.indexOf(id);
            if (i !== -1) touchSlots[i] = null;
            return i;
        };

        function sendInput(type, key, value) {
            if (type === "axis" && key === "LeftStick") {
                state.lx = Math.floor(value.x * 32767);
                state.ly = Math.floor(value.y * 32767);
            }
            if (type === "axis" && key === "RightStick") {
                state.dx = Math.floor(value.x * 32767);
                state.dy = Math.floor(value.y * 32767);
            }
            if (type === "button") {
                const map = { A: 0, B: 1, X: 2, Y: 3 };
                const bit = map[key];
                if (value) state.buttons |= (1 << bit);
                else state.buttons &= ~(1 << bit);
            }
            sendPacket();
        }

        function sendPacket() {
            if (!dataChannel || dataChannel.readyState !== 'open') return;

            const buffer = new ArrayBuffer(49);
            const view = new DataView(buffer);

            view.setInt16(0, state.lx, true);
            view.setInt16(2, state.ly, true);
            view.setInt16(4, state.dx, true);
            view.setInt16(6, state.dy, true);
            
            for (let i = 0; i < 5; i++) {
                const tp = touchStates[i];
                const o = 8 + i * 8;
                view.setInt16(o,     Math.floor(tp.x * 32767), true); 
                view.setInt16(o + 2, Math.floor(tp.y * 32767), true); 
                view.setInt8 (o + 4, tp.id);                          
                view.setInt8 (o + 5, tp.state);                       
                view.setInt16(o + 6, Math.round((tp.pressure || 1.0) * 32767), true); 
            }
            
            view.setUint8(48, state.buttons);

            try {
                dataChannel.send(buffer);
                packetCount++;
            } catch (err) {
                console.error('[Send] Error:', err);
            }
        }

        // --- 5. UI Event Listeners ---
        document.querySelectorAll('.btn').forEach(btn => {
            const buttonName = btn.getAttribute('data-btn');
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (navigator.vibrate) navigator.vibrate(15);
                sendInput('button', buttonName, 1);
                btn.style.background = 'var(--active-glass)';
            });
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                sendInput('button', buttonName, 0);
                btn.style.background = 'var(--bg-glass)';
            });
        });

        const leftStick = nipplejs.create({
            zone: document.getElementById('left-stick-zone'),
            mode: 'static',
            position: { left: '50%', bottom: '50%' },
            color: 'rgba(255,255,255,0.5)',
            size: 130
        });
        leftStick.on('move', (evt, data) => {
            const x = Math.cos(data.angle.radian) * (data.distance / 65);
            const y = Math.sin(data.angle.radian) * (data.distance / 65);
            sendInput('axis', 'LeftStick', { x, y });
        });
        leftStick.on('end', () => sendInput('axis', 'LeftStick', { x: 0, y: 0 }));

        ['left-stick-zone'].forEach(id => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', e => e.stopPropagation(), { passive: true });
            el.addEventListener('touchmove', e => e.stopPropagation(), { passive: true });
            el.addEventListener('touchend', e => e.stopPropagation(), { passive: true });
        });

        const container = document.getElementById("container");
        container.addEventListener('touchstart', (e) => {
            for (const t of e.changedTouches) {
                const slot = alloc(t.identifier);
                if (slot === -1) continue;
                touchStates[slot] = { x: t.clientX / window.innerWidth, y: t.clientY / window.innerHeight, id: slot, state: 1, pressure: t.force || 1.0 };
            }
            sendPacket();
        }, { passive: true });
        
        const SMOOTHING = 0.15;
        container.addEventListener('touchmove', (e) => {
            for (const t of e.changedTouches) {
                const slot = getSlot(t.identifier);
                if (slot === -1) continue;

                const prev = touchStates[slot];
                const rawX = t.clientX / window.innerWidth;
                const rawY = t.clientY / window.innerHeight;

                let newX = rawX;
                let newY = rawY;

                if (prev && prev.state === 1) { 
                    newX = prev.x + (rawX - prev.x) * SMOOTHING;
                    newY = prev.y + (rawY - prev.y) * SMOOTHING;
                }

                touchStates[slot] = { 
                    ...prev, 
                    x: newX, 
                    y: newY, 
                    state: 1, 
                    pressure: t.force || prev.pressure 
                };
            }
            sendPacket();
        }, { passive: true });
        
        container.addEventListener('touchend', (e) => {
            for (const t of e.changedTouches) {
                const slot = freeSlot(t.identifier);
                if (slot === -1) continue;
                touchStates[slot] = { ...touchStates[slot], id: slot, state: 2 };
            }
            sendPacket();
            setTimeout(() => {
                for (let i = 0; i < 5; i++) {
                    if (touchStates[i].state === 2) {
                        touchStates[i] = { x: 0, y: 0, id: 0, state: 0, pressure: 0 };
                    }
                }
            }, 50);
        }, { passive: true });

        window.oncontextmenu = (e) => e.preventDefault();
        
        // Update dashboard every second
        setInterval(async () => {
            await fetchRTCStats();
            updateDebug();
        }, 1000);
        updateDebug();
    </script>
</body>
</html>
